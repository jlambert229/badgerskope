[build]
  publish = "."

[[redirects]]
  from = "/web/*"
  to = "/web/:splat"
  status = 200

[[redirects]]
  from = "/app"
  to = "/web/"
  status = 302

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
